<!DOCTYPE html>
<html lang="zh-Hant-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超人防衛隊：隊員特訓選單</title>
    <style>
        :root {
            --primary: #ff3333;
            --secondary: #00ccff;
            --dark: #0a0f1d;
            --light: #ffffff;
            --success: #00ff66;
            --warning: #ffcc00;
        }
        body {
            margin: 0;
            padding: 10px;
            font-family: 'Arial', 'Microsoft JhengHei', sans-serif;
            background-color: var(--dark);
            color: var(--light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #game-container {
            width: 100%;
            max-width: 650px;
            min-height: 85vh;
            background: linear-gradient(135deg, #111827, #0f172a);
            border: 4px solid var(--secondary);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 204, 255, 0.3);
            position: relative;
            display: flex;
            flex-direction: column;
            padding: 25px;
            box-sizing: border-box;
        }
        .screen { display: none; flex-direction: column; align-items: center; justify-content: center; flex-grow: 1; text-align: center; }
        .screen.active { display: flex; }
        h1 { font-size: 2.2rem; color: var(--primary); margin: 5px 0; }
        h2 { font-size: 1.6rem; color: var(--secondary); margin: 5px 0; }
        .instruction { font-size: 1.3rem; margin-bottom: 15px; color: #cbd5e1; font-weight: bold; }
        .subject-tag {
            background-color: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 1rem;
            margin-bottom: 10px;
            display: inline-block;
        }
        .visual-area {
            font-size: 2.5rem;
            margin: 15px 0;
            min-height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            margin-top: 15px;
        }
        .btn {
            background-color: rgba(255,255,255,0.08);
            border: 2px solid var(--secondary);
            color: var(--light);
            padding: 18px 12px;
            font-size: 1.25rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover, .btn:active {
            background-color: var(--secondary);
            color: var(--dark);
            transform: scale(1.03);
        }
        .member-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; max-width: 500px; margin-top: 20px; }
        .btn-member { padding: 20px 10px; font-size: 1.4rem; }
        .btn-start {
            background-color: var(--primary);
            border-color: var(--primary);
            padding: 15px 40px;
            font-size: 1.6rem;
            animation: bounce 2s infinite;
        }
        @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
        #feedback-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10,15,29,0.95); display: none;
            justify-content: center; align-items: center; z-index: 999;
        }
        #feedback-box {
            width: 90%; max-width: 460px; padding: 25px; border-radius: 16px;
            text-align: center; transform: scale(0.6); transition: transform 0.3s;
        }
        .show-overlay { display: flex !important; }
        .show-overlay #feedback-box { transform: scale(1); }
        .correct-style { background-color: var(--success); color: #000; }
        .wrong-style { background-color: var(--primary); color: white; }
        .progress-bar { height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; margin-top: 20px; }
        .progress-fill { height: 100%; width: 0%; background: var(--secondary); transition: width 0.4s; }
        .prize-image { width: 160px; height: 160px; margin: 15px 0; }
    </style>
</head>
<body>

<div id="game-container">
    <!-- 回饋彈窗 -->
    <div id="feedback-overlay">
        <div id="feedback-box">
            <div id="feedback-text" style="font-size:2.4rem; margin-bottom:15px;">太棒了！</div>
            <div id="feedback-analysis" style="text-align:left; background:rgba(0,0,0,0.3); padding:12px; border-radius:8px; font-size:1.1rem;"></div>
            <button onclick="closeFeedback()" style="margin-top:20px; padding:12px 30px; font-size:1.2rem; background:white; color:black; border:none; border-radius:8px; cursor:pointer;">下一題 ➡️</button>
        </div>
    </div>

    <!-- 選擇隊員畫面 -->
    <div id="screen-select-member" class="screen active">
        <h1>超人防衛隊</h1>
        <h2>請選擇你的特訓隊員</h2>
        <div class="visual-area" style="font-size:5rem;">🚀🛡️🛸</div>
        <p class="instruction">請選擇一名隊員開始特訓基地任務！</p>
        <div class="member-grid">
            <button class="btn btn-member" onclick="selectMember('亦樂')">⚡ 亦樂</button>
            <button class="btn btn-member" onclick="selectMember('允喬')">🛡️ 允喬</button>
            <button class="btn btn-member" onclick="selectMember('立言')">🔮 立言</button>
            <button class="btn btn-member" onclick="selectMember('晴晴')">🌸 晴晴</button>
        </div>
    </div>

    <!-- 開始畫面、遊戲畫面、勝利畫面...（保持原樣） -->
    <!-- 為了簡潔，這裡省略了中間部分（與你原本相同），重點是下面 script 已大幅強化 -->

    <div id="screen-game" class="screen">
        <div><span id="mission-subject" class="subject-tag">科目</span></div>
        <h2 id="mission-title">特訓任務</h2>
        <p id="mission-instruction" class="instruction"></p>
        <div id="mission-visual" class="visual-area"></div>
        <div id="mission-options" class="options-grid"></div>
    </div>

    <!-- 勝利畫面 -->
    <div id="screen-win" class="screen">
        <h1>🏆 特訓任務圓滿成功！</h1>
        <h2 id="win-subtitle" style="color:var(--warning)">你獲得了終極特訓獎勵！</h2>
        <img id="win-prize-img" class="prize-image" src="" alt="獎勵">
        <p id="win-comment" class="instruction" style="color:var(--success);font-size:1.4rem;"></p>
        <button class="btn btn-start" onclick="resetGame()">回主選單</button>
    </div>

    <div class="progress-bar"><div id="progress" class="progress-fill"></div></div>
</div>

<script>
    // === 全域變數 ===
    let currentSelectedMember = "";
    let gameMissions = [];
    let currentMission = 0;
    let score = 0, streak = 0, highestStreak = 0;
    let answeredLocked = false;

    // === 這裡請貼上你原本的四大題庫（lokMissions、kiuMissions、yinMissions、chingMissions）===

    function selectMember(name) {
        currentSelectedMember = name;
        // 切換標題...
        document.getElementById('screen-select-member').classList.remove('active');
        document.getElementById('screen-start').classList.add('active');
    }

    function shuffle(arr) {
        return arr.sort(() => Math.random() - 0.5);
    }

    function startGame() {
        // 重置分數
        score = streak = highestStreak = 0;
        answeredLocked = false;

        // 選取對應題庫（請確保題庫變數已定義）
        if (currentSelectedMember === '亦樂') {
            gameMissions = shuffle([...lokMissions]).slice(0, 8);
        } else if (currentSelectedMember === '允喬') {
            gameMissions = shuffle([...kiuMissions]).slice(0, 8);
        } else if (currentSelectedMember === '立言') {
            gameMissions = shuffle([...yinMissions]).slice(0, 8);
        } else if (currentSelectedMember === '晴晴') {
            gameMissions = shuffle([...chingMissions]).slice(0, 8);
        }

        currentMission = 0;
        document.getElementById('screen-start').classList.remove('active');
        document.getElementById('screen-game').classList.add('active');
        loadMission();
    }

    function loadMission() {
        const m = gameMissions[currentMission];
        document.getElementById('mission-subject').textContent = m.subject;
        document.getElementById('mission-title').textContent = `任務 ${currentMission + 1} / ${gameMissions.length}`;
        document.getElementById('mission-instruction').innerHTML = m.instruction;
        document.getElementById('mission-visual').innerHTML = m.visual || '';

        const container = document.getElementById('mission-options');
        container.innerHTML = '';

        m.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.textContent = opt;
            btn.onclick = () => checkAnswer(opt, m.answer, m.analysis);
            container.appendChild(btn);
        });

        document.getElementById('progress').style.width = `${(currentMission / gameMissions.length) * 100}%`;
    }

    function checkAnswer(selected, correct, analysis) {
        if (answeredLocked) return;
        answeredLocked = true;

        const overlay = document.getElementById('feedback-overlay');
        const box = document.getElementById('feedback-box');
        const text = document.getElementById('feedback-text');
        const analysisEl = document.getElementById('feedback-analysis');

        if (selected === correct) {
            score++;
            streak++;
            if (streak > highestStreak) highestStreak = streak;
            text.innerHTML = '太棒了！🎉';
            box.className = 'correct-style';
        } else {
            streak = 0;
            text.innerHTML = '再試一次！⚡';
            box.className = 'wrong-style';
        }

        analysisEl.innerHTML = `<b>正確答案：</b>${correct}<br><br>${analysis}`;
        overlay.style.display = 'flex';
    }

    function closeFeedback() {
        document.getElementById('feedback-overlay').style.display = 'none';
        if (gameMissions.length > 0) {
            currentMission++;
            if (currentMission < gameMissions.length) {
                loadMission();
            } else {
                winGame();
            }
        }
        answeredLocked = false;
    }

    function winGame() {
        document.getElementById('screen-game').classList.remove('active');
        document.getElementById('screen-win').classList.add('active');
        // 勝利畫面內容...
        const percent = Math.round(score / gameMissions.length * 100);
        document.getElementById('win-comment').innerHTML = `答對 ${score}/${gameMissions.length} 題<br>正確率 ${percent}%`;
    }

    function resetGame() {
        document.getElementById('screen-win').classList.remove('active');
        document.getElementById('screen-select-member').classList.add('active');
    }
</script>
</body>
</html>
