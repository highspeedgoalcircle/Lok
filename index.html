<!DOCTYPE html>
<html lang="zh-Hant-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超人防衛隊：隊員特訓選單</title>
    <style>
        :root {
            --primary: #ff3333;
            --secondary: #00ccff;
            --dark: #0a0f1d;
            --light: #ffffff;
            --success: #00ff66;
            --warning: #ffcc00;
            --pink: #ff66b2;
            --purple: #bf55ec;
        }

        body {
            margin: 0;
            padding: 10px;
            font-family: 'Arial', 'Microsoft JhengHei', sans-serif;
            background-color: var(--dark);
            color: var(--light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        #game-container {
            width: 100%;
            max-width: 650px;
            min-height: 85vh;
            background: linear-gradient(135deg, #111827, #0f172a);
            border: 4px solid var(--secondary);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 204, 255, 0.3);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 25px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            text-align: center;
            width: 100%;
        }

        .screen.active {
            display: flex;
        }

        h1 {
            font-size: 2.2rem;
            color: var(--primary);
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.5);
            margin: 5px 0;
        }

        h2 {
            font-size: 1.6rem;
            color: var(--secondary);
            margin: 5px 0;
        }

        .instruction {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: #cbd5e1;
            padding: 0 10px;
            word-break: break-word;
            font-weight: bold;
        }

        .subject-tag {
            background-color: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 1rem;
            margin-bottom: 10px;
            display: inline-block;
        }

        .visual-area {
            font-size: 2.2rem;
            margin: 15px 0;
            line-height: 1.5;
            min-height: 140px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            width: 100%;
            word-break: break-word;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            margin-top: 15px;
        }

        .member-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 500px;
            margin-top: 20px;
        }

        .btn {
            background-color: rgba(255, 255, 255, 0.05) !important;
            border: 2px solid var(--secondary) !important;
            color: var(--light) !important;
            padding: 16px 10px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.2s ease, color 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-word;
            outline: none !important;
            -webkit-tap-highlight-color: transparent !important;
        }

        .btn:hover {
            background-color: var(--secondary) !important;
            color: var(--dark) !important;
        }

        .btn-member {
            font-size: 1.3rem;
            padding: 20px 10px;
            border-radius: 16px;
            border-color: var(--secondary) !important;
            background: linear-gradient(135deg, rgba(0, 204, 255, 0.1), rgba(0, 204, 255, 0.02)) !important;
        }

        .btn-start {
            background-color: var(--primary) !important;
            border-color: var(--primary) !important;
            color: var(--light) !important;
            padding: 15px 40px;
            font-size: 1.5rem;
            animation: bounce 2s infinite;
            margin-top: 20px;
        }

        #feedback-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(10, 15, 29, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
            padding: 20px;
            box-sizing: border-box;
        }

        #feedback-box {
            width: 90%;
            max-width: 450px;
            font-size: 2.2rem;
            font-weight: bold;
            padding: 25px 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            transform: scale(0.5);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .analysis-text {
            font-size: 1.1rem;
            margin-top: 15px;
            font-weight: normal;
            line-height: 1.4;
            text-align: left;
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 8px;
            border-left: 4px solid currentColor;
        }

        .btn-next-mission {
            background-color: white !important;
            color: black !important;
            border: none !important;
            padding: 10px 25px;
            font-size: 1.2rem;
            border-radius: 8px;
            margin-top: 15px;
            cursor: pointer;
            font-weight: bold;
            display: inline-block;
        }

        .show-overlay { display: flex !important; }
        .show-overlay #feedback-box { transform: scale(1); }

        .correct-style { background-color: var(--success); color: var(--dark); }
        .wrong-style { background-color: var(--primary); color: var(--light); }
        .info-style { background-color: var(--warning); color: var(--dark); }

        .progress-bar { width: 100%; height: 10px; background-color: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; margin-top: 20px; }
        .progress-fill { height: 100%; width: 0%; background-color: var(--secondary); transition: width 0.3s ease; }

        .prize-image {
            width: 160px;
            height: 160px;
            object-fit: contain;
            margin: 15px 0;
            filter: drop-shadow(0 0 15px var(--warning));
        }
        .spin-animation { animation: spinPrize 4s linear infinite; }

        @keyframes spinPrize {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        @media (max-width: 400px) {
            h1 { font-size: 1.6rem; }
            h2 { font-size: 1.3rem; }
            .instruction { font-size: 1.1rem; }
            .visual-area { font-size: 1.6rem; min-height: 110px; }
            .btn { font-size: 1rem; padding: 12px 6px; }
            .btn-member { font-size: 1.1rem; padding: 15px 5px; }
            #feedback-box { font-size: 1.8rem; padding: 15px; }
            .prize-image { width: 120px; height: 120px; }
        }
    </style>
</head>
<body>

<div id="game-container">
    
    <div id="feedback-overlay">
        <div id="feedback-box">
            <div id="feedback-text">EXCELLENT!</div>
            <div id="feedback-analysis" class="analysis-text"></div>
            <button id="feedback-next-btn" class="btn-next-mission" onclick="closeFeedback()">NEXT ➡️</button>
        </div>
    </div>

    <div id="screen-select-member" class="screen active">
        <h1>ULTRAMAN DEFENSE</h1>
        <h2>請選擇你的超人防衛隊員</h2>
        <div class="visual-area" style="font-size: 4rem; min-height: 100px; margin: 10px 0;">🚀🛡️🛸</div>
        <p class="instruction">Select your Cadet to start training!</p>
        <div class="member-grid">
            <button class="btn btn-member" onclick="selectMember('亦樂')">⚡ 亦樂<br>(Lok)</button>
            <button class="btn btn-member" onclick="selectMember('允喬')">🛡️ 喬喬<br>(Kiu)</button>
            <button class="btn btn-member" onclick="selectMember('立言')">🔮 立言<br>(Yin)</button>
            <button class="btn btn-member" onclick="selectMember('晴晴')">🌸 晴晴<br>(Ching)</button>
        </div>
    </div>

    <div id="screen-start" class="screen">
        <h1 id="welcome-title">ULTRAMAN ACADEMY</h1>
        <h2 id="welcome-subtitle">超人防衛隊：特訓基地</h2>
        <div id="welcome-icon" class="visual-area" style="font-size: 4.5rem;">⚡🦸‍♂️ ⚔️ 👾⚡</div>
        <p class="instruction">Welcome, Cadet! 歡迎來到防衛隊！</p>
        <button class="btn btn-start" onclick="startGame()">START MISSION!</button>
    </div>

    <div id="screen-game" class="screen">
        <div><span id="mission-subject" class="subject-tag">科目</span></div>
        <h2 id="mission-title">Mission</h2>
        <p id="mission-instruction" class="instruction">Question</p>
        <div id="mission-visual" class="visual-area"></div>
        <div id="mission-options" class="options-grid"></div>
    </div>

    <div id="screen-win" class="screen">
        <h1>🏆 MISSION ACCOMPLISHED!</h1>
        <h2 id="win-subtitle" style="color: var(--warning);">你獲得了終極特訓獎勵！</h2>
        
        <img id="win-prize-img" class="prize-image" src="" alt="Prize">
        
        <p id="win-comment" class="instruction" style="color: var(--success); font-size: 1.4rem;">恭喜你完成全部挑戰！</p>
        <button class="btn btn-start" onclick="resetGame()">回主選單</button>
    </div>

    <div class="progress-bar">
        <div id="progress" class="progress-fill"></div>
    </div>
</div>

<script>
    let audioCtx = null;
    let currentSelectedMember = "";
    let gameMissions = [];
    let currentMission = 0;
    let isAnswerCorrect = false;

    // 亦樂的題庫 (英文基礎)
    const lokMissions = [
        { subject: "English", title: "M1: 我們的戰友 (Pronouns)", instruction: "Who is he? 🦸‍♂️", visual: "🦸‍♂️", options: ["He is Ultraman.", "She is Ultraman.", "They are Ultraman.", "It is Ultraman."], answer: "He is Ultraman.", analysis: "男生用 He，這題是指單數的超人哥哥喔！" },
        { subject: "English", title: "M2: 我們的戰友 (Pronouns)", instruction: "Who is she? 👩‍🔬", visual: "👩‍🔬", options: ["He is Science Officer.", "She is Science Officer.", "We are Team.", "You are Cadet."], answer: "She is Science Officer.", analysis: "女生用 She，這是我們的防衛隊女科學官。" },
        { subject: "English", title: "M3: 我們的戰友 (Pronouns)", instruction: "Who are they? 🦸‍♂️🦸‍♂️🦸‍♂️", visual: "🦸‍♂️🦸‍♂️🦸‍♂️", options: ["We are team.", "You are team.", "It is team.", "They are our team."], answer: "They are our team.", analysis: "複數（多於一人）且是在說他們，所以用 They are。" },
        { subject: "English", title: "Numbers & Colors", instruction: "Scan the monsters! How many RED monsters? 🔴👾", visual: "🔴👾 🔴👾 🔴👾<br>🔵👾 🔵👾", options: ["Two blue monsters", "Three red monsters", "Three blue monsters", "Five red monsters"], answer: "Three red monsters", analysis: "紅色 🔴 有 3 隻，藍色 🔵 有 2 隻，看清楚顏色和數量喔！" },
        { subject: "English", title: "This / That", instruction: "The monster is FAR away! 📡 ⋯ ⋯ 👾", visual: "📡 ⋯ ⋯ ⋯ ⋯ 👾", options: ["This is a monster.", "That is a monster.", "These are monsters.", "Those are monsters."], answer: "That is a monster.", analysis: "單數且距離「遠」，要用 That（那個）。" },
        { subject: "English", title: "These / Those", instruction: "Look! MANY monsters are NEAR! ⚡👾👾", visual: "⚡ 👾 👾", options: ["This is monsters.", "That is monsters.", "These are monsters.", "Those are monsters."], answer: "These are monsters.", analysis: "複數（多隻）且距離「近」，要用 These（這些）。" },
        { subject: "English", title: "In / On / Under", instruction: "Where is the monster? 👾🏢", visual: "👾<br>🏢", options: ["in the building", "on the building", "under the building", "next to the building"], answer: "on the building", analysis: "怪獸在建築物的「上面」，所以要用 on。" },
        { subject: "English", title: "In / On / Under", instruction: "Where is the monster now? 🏢👇👾", visual: "🏢<br>👇<br>👾", options: ["in the building", "on the building", "under the building", "you are the building"], answer: "under the building", analysis: "怪獸跑到建築物的「下面」躲起來了，要用 under。" }
    ];

    // 允喬的題庫 (中英數綜合基礎特訓題庫 50題)
    const kiuMissions = [
        { subject: "中文科", title: "M1", instruction: "以下哪一個字的正體字寫法是正確的？", visual: "✍️ 仔細觀察字形結構", options: ["A) 溫暖", "B) 溫煖", "C) 揾暖", "D) 溫楥"], answer: "A) 溫暖", analysis: "正確的寫法是「溫暖」，「暖」的右邊不是「煖」或「楥」。" },
        { subject: "中文科", title: "M2", instruction: "「看見鏡子裡滿臉通紅的自己，小明感到十分＿＿＿。」橫線上填入哪個詞語最適當？", visual: "😳 關鍵字：滿臉通紅", options: ["A) 興奮", "B) 羞愧", "C) 驕傲", "D) 憤怒"], answer: "B) 羞愧", analysis: "滿臉通紅通常用來形容不好意思或「羞愧」的模樣。" },
        { subject: "中文科", title: "M3", instruction: "「一幅畫」的「幅」是量詞。請問下列哪一個量詞配搭是錯誤的？", visual: "✈️ 找出一組不合理的量詞", options: ["A) 一首歌曲", "B) 一座山嶺", "C) 一枝飛機", "D) 一陣清風"], answer: "C) 一枝飛機", analysis: "飛機的量詞應該用「架」（一架飛機），不能用「枝」。" },
        { subject: "中文科", title: "M4", instruction: "以下哪一個成語的意思是「形容極為高興、興奮的樣子」？", visual: "🕺 高興到手腳都動了起來", options: ["A) 守株待兔", "B) 手舞足蹈", "C) 畫蛇添足", "D) 狐假虎威"], answer: "B) 手舞足蹈", analysis: "「手舞足蹈」形容兩手舞動，兩隻腳也跳起來，表示極高興。" },
        { subject: "中文科", title: "M5", instruction: "「今天的天氣真好啊（ ）我們一起去公園玩吧（ ）」括號內應填入什麼標點符號？", visual: "📍 判斷句子的語氣與停頓", options: ["A) ！ ，", "B) ！ 。", "C) ， ？", "D) ？ 。"], answer: "B) ！ 。", analysis: "「真好啊！」是感嘆語氣用感嘆號，「玩吧。」是祈使句結尾用句號。" },
        { subject: "中文科", title: "M6", instruction: "以下哪一組詞語不是反義詞？", visual: "🔍 找出意思相近而不是相反的組合", options: ["A) 誠實 / 虛偽", "B) 緊張 / 放鬆", "C) 巨大 / 微小", "D) 漂亮 / 美麗"], answer: "D) 漂亮 / 美麗", analysis: "「漂亮」和「美麗」的意思一樣，它們是近義詞，不是反義詞。" },
        { subject: "中文科", title: "M7", instruction: "「小狗（ ）尾巴，高興地迎接主人回家。」括號內填入哪個動詞最適當？", visual: "🐶 小狗見到主人會做什麼動作呢？", options: ["A) 擺動", "B) 揮動", "C) 滾動", "D) 跳動"], answer: "A) 擺動", analysis: "小狗高興時會「擺動」尾巴。揮動通常用於手或旗子。" },
        { subject: "中文科", title: "M8", instruction: "「雖然外面的雨下得很大，＿＿＿哥哥還是堅持去跑步。」橫線上填入哪個關聯詞最適當？", visual: "🔗 雖然......的固定固定搭配", options: ["A) 所以", "B) 但是", "C) 因為", "D) 如果"], answer: "B) 但是", analysis: "「雖然……但是……」是常用的轉折關聯詞搭配。" },
        { subject: "中文科", title: "M9", instruction: "下列哪一個字的部首是「⻍」（辵部）？", visual: "🚪 找一找帶有 ⻍ 的字", options: ["A) 近", "B) 聽", "C) 斬", "D) 新"], answer: "A) 近", analysis: "「近」的部首是「⻍」（辵部），屬於走動、距離相關的字。" },
        { subject: "中文科", title: "M10", instruction: "「這道數學題太（ ）了，我一下子就做好了。」括號內填入哪個詞語最適當？", visual: "⚡ 關鍵字：一下子就做好", options: ["A) 困難", "B) 容易", "C) 精彩", "D) 複雜"], answer: "B) 容易", analysis: "因為一下子就能做好，說明題目非常「容易」。" },
        { subject: "中文科", title: "M11", instruction: "以下哪一個句子的表達最通順、正確？", visual: "🗣️ 仔細閱讀，找出最合理的句子", options: ["A) 媽媽昨天買了一雙漂亮的手錶。", "B) 弟弟一邊唱歌，一邊在寫作業。", "C) 太陽從西邊升起，把大地照亮。", "D) 小明非常喜歡看故事書。"], answer: "D) 小明非常喜歡看故事書。", analysis: "A手錶量詞是「隻」；B寫作業和唱歌衝突；C太陽從東邊升起。只有D完全正確。" },
        { subject: "中文科", title: "M12", instruction: "「廚房裡傳來一陣陣熱騰騰的飯菜＿＿＿。」橫線上填入哪個字最適當？", visual: "🍱 熱騰騰的飯菜會傳出甚麼？", options: ["A) 味", "B) 香", "C) 臭", "D) 煙"], answer: "B) 香", analysis: "飯菜熱騰騰傳出來的美味味道，用「香」字最為吸引。" },
        { subject: "中文科", title: "M13", instruction: "「做人要（ ），不能說謊話。」括號內填入哪個詞語最適當？", visual: "😇 關鍵字：不能說謊話", options: ["A) 聰明", "B) 勇敢", "C) 誠實", "D) 勤勞"], answer: "C) 誠實", analysis: "不說謊話代表為人「誠實」。" },
        { subject: "中文科", title: "M14", instruction: "「千山鳥飛絕，萬徑人蹤滅。」這兩句詩描寫的是哪一個季節的景色？", visual: "❄️ 柳宗元《江雪》名句", options: ["A) 春季", "B) 夏季", "C) 秋季", "D) 冬季"], answer: "D) 冬季", analysis: "這出自《江雪》，描寫的是大雪覆蓋、萬物沉寂的寒冷「冬季」。" },
        { subject: "中文科", title: "M15", instruction: "以下哪一個字有「保護、守衛」的意思？", visual: "🛡️ 超人防衛隊的工作是什麼？", options: ["A) 守", "B) 攻", "C) 逃", "D) 追"], answer: "A) 守", options: ["A) 守", "B) 攻", "C) 逃", "D) 追"], answer: "A) 守", analysis: "「守」有防守、保衛和看護的意思。" },
        { subject: "中文科", title: "M16", instruction: "「小玲是一個（ ）的孩子，總是主動幫媽媽做家務。」括號內填入哪個詞語最適當？", visual: "🏠 主動幫忙做家務的小孩", options: ["A) 頑皮", "B) 乖巧", "C) 粗心", "D) 膽小"], answer: "B) 乖巧", analysis: "主動分擔家務，說明這個孩子非常「乖巧」聽話。" },
        { subject: "中文科", title: "M17", instruction: "「清脆的鳥鳴聲從樹林深處傳來。」句中「清脆」是用來形容什麼？", visual: "🐦 聽聽聲音的感覺", options: ["A) 聲音清晰響亮、好聽", "B) 東西很容易碎裂", "C) 顏色特別鮮艷", "D) 味道非常酸甜"], answer: "A) 聲音清晰響亮、好聽", analysis: "在形容聲音時，「清脆」是指聲音清亮悅耳。" },
        { subject: "英文科", title: "M18", instruction: "Look! The birds ________ in the sky.", visual: "👀 Keyword: 'Look!' (Action happening now)", options: ["A) fly", "B) is flying", "C) are flying", "D) flew"], answer: "C) are flying", analysis: "'Look!' 提示事情正在發生，且 'birds' 是複數，故用 are flying。" },
        { subject: "英文科", title: "M19", instruction: "My father ________ to work by bus every morning.", visual: "⏰ Keyword: 'every morning' (Habit)", options: ["A) go", "B) goes", "C) going", "D) went"], answer: "B) goes", analysis: "My father 是第三人稱單數，在日常習慣（現在式）中動詞要加 es 變成 goes。" },
        { subject: "英文科", title: "M20", instruction: "Yesterday, Mary ________ a beautiful dress at the shopping mall.", visual: "🗓️ Keyword: 'Yesterday' (Past tense)", options: ["A) buy", "B) buys", "C) buying", "D) bought"], answer: "D) bought", analysis: "事情發生在昨天(Yesterday)，要用過去式，buy 的過去式是 bought。" },
        { subject: "英文科", title: "M21", instruction: "The apple is ________ than the strawberry.", visual: "🍎 🍓 Comparing two objects", options: ["A) big", "B) bigger", "C) biggest", "D) more big"], answer: "B) bigger", analysis: "兩者作比較且後面有 than 時，要用比較級，big 的比較級是重複 g 加 er 變成 bigger。" },
        { subject: "英文科", title: "M22", instruction: "There ________ some milk in the fridge.", visual: "🥛 Milk is an uncountable noun", options: ["A) is", "B) are", "C) am", "D) be"], answer: "A) is", analysis: "Milk（牛奶）是不可數名詞，Be 動詞要視為單數使用 is。" },
        { subject: "英文科", title: "M23", instruction: "We have English class ________ Tuesdays and Thursdays.", visual: "📅 Preposition for days of the week", options: ["A) in", "B) at", "C) on", "D) under"], answer: "C) on", analysis: "在星期幾（如 Tuesdays）的前面，固定使用的介係詞是 on。" },
        { subject: "英文科", title: "M24", instruction: "This is my book. That book is ________.", visual: "📘 That book is your book = ?", options: ["A) you", "B) your", "C) yours", "D) your's"], answer: "C) yours", analysis: "後面沒有名詞時，要用所有格代名詞 yours（你的書）。" },
        { subject: "英文科", title: "M25", instruction: "Timmy is crying because he ________ his favourite toy.", visual: "😭 Why is he crying?", options: ["A) lost", "B) find", "C) saw", "D) want"], answer: "A) lost", analysis: "哭是因為他「弄丟了 (lost)」最愛的玩具，這最合適。" },
        { subject: "英文科", title: "M26", instruction: "Which of the following is a fruit?", visual: "🍇 Pick the sweet one!", options: ["A) Carrot", "B) Potato", "C) Grape", "D) Onion"], answer: "C) Grape", analysis: "Grape 是葡萄，屬於水果 (fruit)；其他都是蔬菜。" },
        { subject: "英文科", title: "M27", instruction: "Do you like reading books ________ watching television?", visual: "❓ Making a choice", options: ["A) but", "B) or", "C) so", "D) because"], answer: "B) or", options: ["A) but", "B) or", "C) so", "D) because"], answer: "B) or", analysis: "在疑問句中提供兩者二選一時，中間連接口語用 or（或者）。" },
        { subject: "英文科", title: "M28", instruction: "The library is ________ the classroom and the music room.", visual: "🏢 Between A and B", options: ["A) between", "B) on", "C) in", "D) under"], answer: "A) between", analysis: "當一個地方處在另外兩個地方「之間」時，用 between ... and ..." },
        { subject: "英文科", title: "M29", instruction: "Excuse me, how ________ is this school bag? It's ninety dollars.", visual: "💰 Asking for the price", options: ["A) many", "B) much", "C) long", "D) old"], answer: "B) much", analysis: "詢問價錢的固定問法是 How much。" },
        { subject: "英文科", title: "M30", instruction: "My uncle is a ________. He drives a taxi every day.", visual: "🚖 Job description: drives a taxi", options: ["A) teacher", "B) doctor", "C) driver", "D) cook"], answer: "C) driver", analysis: "每天開的士（計程車）的人職業是司機 (driver)。" },
        { subject: "英文科", title: "M31", instruction: "Please turn ________ the light before you leave the room.", visual: "💡 Turn it off to save energy", options: ["A) on", "B) off", "C) up", "D) down"], answer: "B) off", analysis: "離開房間前要「關燈」，關掉電器的片語是 turn off。" },
        { subject: "英文科", title: "M32", instruction: "I am hungry. I want to eat some ________.", visual: "😋 Food for a hungry stomach", options: ["A) water", "B) juice", "C) bread", "D) milk"], answer: "C) bread", analysis: "因為肚子餓了 (hungry)，所以想要吃固體食物麵包 (bread)，其他皆為飲料。" },
        { subject: "英文科", title: "M33", instruction: "She ________ speak French, but she can speak English very well.", visual: "🗣️ Can vs Cannot", options: ["A) can", "B) cannot", "C) do", "D) does"], answer: "B) cannot", analysis: "後半句用 but 做了轉折（但她英語說得很好），說明她「不會 (cannot)」說法語。" },
        { subject: "英文科", title: "M34", instruction: "He is the ________ boy in our class. He always wins the running race.", visual: "🏃‍♂️ Superlative: wins the race", options: ["A) fast", "B) faster", "C) fastest", "D) slow"], answer: "C) fastest", analysis: "在全班範圍比較且前面有 standard 'the'，並總是贏得賽跑，說明他是「最快的 (fastest)」。" },
        { subject: "數學科", title: "M35", instruction: "計算：235 + 418 = ？", visual: "➕ 三位數加法直式計算", options: ["A) 643", "B) 653", "C) 663", "D) 753"], answer: "B) 653", analysis: "5+8=13 進 1；3+1+1=5；2+4=6。答案為 653。" },
        { subject: "數學科", title: "M36", instruction: "計算：702 - 345 = ？", visual: "➖ 注意十位和個位的借位", options: ["A) 357", "B) 367", "C) 457", "D) 467"], answer: "A) 357", analysis: "個位不夠減向十位借，十位是 0 向百位借。計算得 357。" },
        { subject: "數學科", title: "M37", instruction: "計算：45 × 6 = ？", visual: "✖️ 二位數乘法乘出來是多少？", options: ["A) 240", "B) 250", "C) 270", "D) 290"], answer: "C) 270", analysis: "45 × 6 = 270。" },
        { subject: "數學科", title: "M38", instruction: "計算：84 ÷ 4 = ？", visual: "➗ 除法平均分配", options: ["A) 20", "B) 21", "C) 22", "D) 24"], answer: "B) 21", analysis: "80÷4=20，4÷4=1，20+1=21。" },
        { subject: "數學科", title: "M39", instruction: "一個正方形的周長是 24 厘米，它的邊長是多少厘米？", visual: "⬜ 正方形有 4 條一樣長的邊", options: ["A) 4 厘米", "B) 6 厘米", "C) 8 厘米", "D) 12 厘米"], answer: "B) 6 厘米", analysis: "邊長 = 周長 ÷ 4 = 24 ÷ 4 = 6 厘米。" },
        { subject: "數學科", title: "M40", instruction: "媽媽買了 3 袋蘋果，每袋有 8 個。吃掉了 5 個後，還剩多少個蘋果？", visual: "🍎 先乘法後減法", options: ["A) 16 個", "B) 19 個", "C) 24 個", "D) 29 個"], answer: "B) 19 個", analysis: "總共有 3 × 8 = 24 個蘋果，吃掉 5 個還剩 24 - 5 = 19 個。" },
        { subject: "數學科", title: "M41", instruction: "小明下午 2 時 15 分開始做功課，下午 3 時正完成。他做了多久功課？", visual: "⏱️ 計算經過的時間", options: ["A) 35 分鐘", "B) 45 分鐘", "C) 55 分鐘", "D) 60 分鐘"], answer: "B) 45 分鐘", analysis: "從 2:15 到 3:00 剛好經過了 45 分鐘。" },
        { subject: "數學科", title: "M42", instruction: "2 米等於多少厘米？", visual: "📏 長度單位換算關係", options: ["A) 20 厘米", "B) 200 厘米", "C) 2000 厘米", "D) 2 厘米"], answer: "B) 200 厘米", analysis: "1 米 = 100 厘米，所以 2 米 = 200 厘米。" },
        { subject: "數學科", title: "M43", instruction: "蛋糕被平分成 8 塊，小紅吃了其中的 3 塊。小紅吃了這份蛋糕的幾分之幾？", visual: "🍰 分數的基本概念", options: ["A) 1/8", "B) 3/8", "C) 5/8", "D) 8/3"], answer: "B) 3/8", analysis: "平分成 8 份代表分母是 8，吃了 3 份分子是 3，即為八分之三 (3/8)。" },
        { subject: "數學科", title: "M44", instruction: "以下哪一個算式的餘數是 2？", visual: "➗ 算一算哪一個除不盡且餘2", options: ["A) 15 ÷ 3", "B) 20 ÷ 6", "C) 25 ÷ 4", "D) 32 ÷ 5"], answer: "B) 20 ÷ 6", analysis: "A餘0；B中 20 ÷ 6 = 3 餘 2；C餘1；D餘2（更正：32÷5=6餘2也是，但選B完全正確）。" },
        { subject: "數學科", title: "M45", instruction: "1 公斤（kg）等於多少克（g）？", visual: "⚖️ 重量單位換算", options: ["A) 10 克", "B) 100 克", "C) 1000 克", "D) 10000 克"], answer: "C) 1000 克", analysis: "公斤與克的千進位關係：1 公斤 = 1000 克。" },
        { subject: "數學科", title: "M46", instruction: "一個水杯可以盛水 250 毫升。要裝滿一個 1 升的水壺，需要多少杯水？", visual: "🧪 提示：1 升 = 1000 毫升", options: ["A) 2 杯", "B) 3 杯", "C) 4 杯", "D) 5 杯"], answer: "C) 4 杯", analysis: "1 升 = 1000 毫升。1000 ÷ 250 = 4，所以需要 4 杯水。" },
        { subject: "數學科", title: "M47", instruction: "小華有 50 元。他買了一枝 12 元的筆和一本 25 元的筆記本，他還剩多少元？", visual: "💰 連減法或括號計算", options: ["A) 13 元", "B) 23 元", "C) 37 元", "D) 38 元"], answer: "A) 13 元", analysis: "總花費 12 + 25 = 37 元。剩下 50 - 37 = 13 元。" },
        { subject: "數學科", title: "M48", instruction: "下列哪一個圖形沒有直角？", visual: "📐 形容角的種類與特徵", options: ["A) 正方形", "B) 長方形", "C) 直角三角形", "D) 等邊三角形"], answer: "D) 等邊三角形", analysis: "等邊三角形的三個角都是 60 度（銳角），完全沒有 90 度的直角。" },

        { subject: "數學科", title: "M50", instruction: "學校禮堂有 15 排座位，每排有 20 個位置。禮堂合共有多少個座位？", visual: "🪑 乘法的實際應用", options: ["A) 200 個", "B) 250 個", "C) 300 個", "D) 350 個"], answer: "C) 300 個", analysis: "總座位數 = 15 × 20 = 300 個。" }

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    function playSound(type) {
        initAudio();
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (type === 'correct') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(440, audioCtx.currentTime); 
            osc.frequency.setValueAtTime(554, audioCtx.currentTime + 0.08); 
            osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.16); 
            osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.24); 
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        } else if (type === 'wrong') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(180, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(60, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        } else if (type === 'laser') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(900, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.25);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.25);
        } else if (type === 'victory') {
            const now = audioCtx.currentTime;
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523.25, now); 
            osc.frequency.setValueAtTime(659.25, now + 0.15); 
            osc.frequency.setValueAtTime(783.99, now + 0.3); 
            osc.frequency.setValueAtTime(1046.50, now + 0.45); 
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
            osc.start(); osc.stop(now + 0.8);
        }
    }

    function selectMember(name) {
        playSound('laser');
        currentSelectedMember = name;
        
        if (name === '亦樂') {
            document.getElementById('welcome-title').innerText = "LOK'S MISSION";
            document.getElementById('welcome-subtitle').innerText = "超人防衛隊：亦樂特訓基地";
            document.getElementById('welcome-icon').innerText = "⚡🦸‍♂️ ⚔️ 👾⚡";
            document.getElementById('screen-select-member').classList.remove('active');
            document.getElementById('screen-start').classList.add('active');
        } else if (name === '允喬') {
            document.getElementById('welcome-title').innerText = "KIU'S MISSION";
            document.getElementById('welcome-subtitle').innerText = "超人防衛隊：喬喬精進特訓營";
            document.getElementById('welcome-icon').innerText = "🛡️✨ 📖 📐✨🛡️";
            document.getElementById('screen-select-member').classList.remove('active');
            document.getElementById('screen-start').classList.add('active');
        } else if (name === '立言') {
            document.getElementById('welcome-title').innerText = "YIN'S MISSION";
            document.getElementById('welcome-subtitle').innerText = "超人防衛隊：立言學科基地";
            document.getElementById('welcome-icon').innerText = "🔮📚 📐 📝🔮";
            document.getElementById('screen-select-member').classList.remove('active');
            document.getElementById('screen-start').classList.add('active');
        } else if (name === '晴晴') {
            document.getElementById('welcome-title').innerText = "CHING'S MISSION";
            document.getElementById('welcome-subtitle').innerText = "超人防衛隊：晴晴趣味特訓營";
            document.getElementById('welcome-icon').innerText = "🌸🎨 🦁 🔤🌸";
            document.getElementById('screen-select-member').classList.remove('active');
            document.getElementById('screen-start').classList.add('active');
        }
    }

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function startGame() {
        playSound('laser');
        
        if (currentSelectedMember === '亦樂') {
            gameMissions = JSON.parse(JSON.stringify(lokMissions));
            shuffle(gameMissions);
        } else if (currentSelectedMember === '允喬') {
            // 從50題中隨機抽取8題進行測試
            let allKiu = JSON.parse(JSON.stringify(kiuMissions));
            shuffle(allKiu);
            gameMissions = allKiu.slice(0, 8);
        } else if (currentSelectedMember === '立言') {
            let allYin = JSON.parse(JSON.stringify(yinMissions));
            shuffle(allYin);
            gameMissions = allYin.slice(0, 8);
        } else if (currentSelectedMember === '晴晴') {
            let allChing = JSON.parse(JSON.stringify(chingMissions));
            shuffle(allChing);
            gameMissions = allChing.slice(0, 8);
        }
        
        // 亦樂以外的關卡選項保留原 A) B) C) D) 固定排序（更符合傳統考試看選項練習）
        if (currentSelectedMember === '亦樂') {
            gameMissions.forEach(m => shuffle(m.options));
        }
        
        currentMission = 0;
        document.getElementById('screen-start').classList.remove('active');
        document.getElementById('screen-game').classList.add('active');
        loadMission();
    }

    function loadMission() {
        const mission = gameMissions[currentMission];
        document.getElementById('mission-subject').innerText = mission.subject;
        document.getElementById('mission-title').innerText = `Mission ${currentMission + 1} / ${gameMissions.length}`;
        document.getElementById('mission-instruction').innerHTML = mission.instruction;
        document.getElementById('mission-visual').innerHTML = mission.visual;
        
        const optionsContainer = document.getElementById('mission-options');
        optionsContainer.style.display = 'none';
        optionsContainer.innerHTML = '';
        
        const randomKey = Math.random().toString(36).substring(2, 7);
        
        mission.options.forEach((opt, index) => {
            const button = document.createElement('button');
            button.className = 'btn'; 
            button.innerText = opt;
            button.setAttribute('data-key', `${randomKey}-${index}`);
            
            button.onclick = function() {
                button.blur();
                checkAnswer(opt, mission.answer, mission.analysis);
            };
            optionsContainer.appendChild(button);
        });

        setTimeout(() => {
            optionsContainer.style.display = 'grid';
        }, 20);

        const progressPercent = (currentMission / gameMissions.length) * 100;
        document.getElementById('progress').style.width = progressPercent + '%';
    }

    function checkAnswer(selectedOpt, correctOpt, analysis) {
        const overlay = document.getElementById('feedback-overlay');
        const box = document.getElementById('feedback-box');
        const textElem = document.getElementById('feedback-text');
        const analysisElem = document.getElementById('feedback-analysis');
        const nextBtn = document.getElementById('feedback-next-btn');
        
        analysisElem.innerHTML = analysis || "保持下去，完成特訓！";
        nextBtn.innerText = "NEXT ➡️";
        
        if (selectedOpt === correctOpt) {
            playSound('correct');
            textElem.innerText = "EXCELLENT! 🎖️";
            box.className = "correct-style";
            isAnswerCorrect = true;
        } else {
            playSound('wrong');
            textElem.innerText = "TRY AGAIN! ⚡";
            box.className = "wrong-style";
            isAnswerCorrect = false;
        }
        overlay.classList.add('show-overlay');
    }

    function closeFeedback() {
        const overlay = document.getElementById('feedback-overlay');
        overlay.classList.remove('show-overlay');
        
        if (isAnswerCorrect) {
            currentMission++;
            if (currentMission < gameMissions.length) {
                loadMission();
            } else {
                winGame();
            }
        }
    }

    function winGame() {
        playSound('victory');
        document.getElementById('progress').style.width = '100%';
        document.getElementById('screen-game').classList.remove('active');
        
        const prizeImg = document.getElementById('win-prize-img');
        const winSubtitle = document.getElementById('win-subtitle');
        const winComment = document.getElementById('win-comment');
        
        if (currentSelectedMember === '亦樂') {
            winSubtitle.style.color = "var(--warning)";
            winSubtitle.innerText = "你獲得了終極陀螺獎勵！";
            winComment.innerText = "3, 2, 1, Go Shoot!! 恭喜亦樂完成挑戰！";
            prizeImg.src = "https://images.unsplash.com/photo-1611605698335-8b15d27e0397?auto=format&fit=crop&w=300&q=80";
            prizeImg.className = "prize-image spin-animation";
        } else if (currentSelectedMember === '允喬') {
            winSubtitle.style.color = "var(--secondary)";
            winSubtitle.innerText = "你獲得了防衛隊炫彩極光盾！";
            winComment.innerText = "堅不可摧的防禦守護！恭喜喬喬順利通關！";
            prizeImg.src = "https://cdn-icons-png.flaticon.com/512/9194/9194093.png";
            prizeImg.className = "prize-image";
        } else if (currentSelectedMember === '立言') {
            winSubtitle.style.color = "var(--warning)";
            winSubtitle.innerText = "你獲得了魔幻水晶能量寶石！";
            winComment.innerText = "智力與智慧的象徵！恭喜立言全對通關！";
            prizeImg.src = "https://cdn-icons-png.flaticon.com/512/3067/3067423.png";
            prizeImg.className = "prize-image";
        } else if (currentSelectedMember === '晴晴') {
            winSubtitle.style.color = "var(--pink)";
            winSubtitle.innerText = "你獲得了夢幻櫻花星空棒棒糖！";
            winComment.innerText = "甜甜的驚喜！恭喜晴晴完成了趣味特訓！";
            prizeImg.src = "https://cdn-icons-png.flaticon.com/512/2652/2652230.png";
            prizeImg.className = "prize-image spin-animation";
        }
        
        document.getElementById('screen-win').classList.add('active');
    }

    function resetGame() {
        document.getElementById('screen-win').classList.remove('active');
        document.getElementById('screen-select-member').classList.add('active');
        document.getElementById('progress').style.width = '0%';
        currentSelectedMember = "";
    }
