<!DOCTYPE html>
<html lang="zh-Hant-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超人防衛隊：隊員特訓選單</title>
    <style>
        :root {
            --primary: #ff3333;
            --secondary: #00ccff;
            --dark: #0a0f1d;
            --light: #ffffff;
            --success: #00ff66;
            --warning: #ffcc00;
        }

        body {
            margin: 0;
            padding: 10px;
            font-family: 'Arial', 'Microsoft JhengHei', sans-serif;
            background-color: var(--dark);
            color: var(--light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        #game-container {
            width: 100%;
            max-width: 650px;
            min-height: 85vh;
            background: linear-gradient(135deg, #111827, #0f172a);
            border: 4px solid var(--secondary);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 204, 255, 0.3);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 25px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            text-align: center;
            width: 100%;
        }

        .screen.active {
            display: flex;
        }

        h1 {
            font-size: 2.2rem;
            color: var(--primary);
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.5);
            margin: 5px 0;
        }

        h2 {
            font-size: 1.6rem;
            color: var(--secondary);
            margin: 5px 0;
        }

        .instruction {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: #cbd5e1;
            padding: 0 10px;
            word-break: break-word;
            font-weight: bold;
        }

        .visual-area {
            font-size: 3.5rem;
            margin: 20px 0;
            line-height: 1.4;
            min-height: 140px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            letter-spacing: 5px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            margin-top: 15px;
        }

        .member-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 400px;
            margin-top: 20px;
        }

        .btn {
            background-color: rgba(255, 255, 255, 0.05) !important;
            border: 2px solid var(--secondary) !important;
            color: var(--light) !important;
            padding: 16px 10px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.2s ease, color 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-word;
            outline: none !important;
            -webkit-tap-highlight-color: transparent !important;
        }

        .btn:hover {
            background-color: var(--secondary) !important;
            color: var(--dark) !important;
        }

        .btn-member {
            font-size: 1.5rem;
            padding: 20px;
            border-radius: 16px;
            border-color: var(--secondary) !important;
            background: linear-gradient(135deg, rgba(0, 204, 255, 0.1), rgba(0, 204, 255, 0.02)) !important;
        }

        .btn-start {
            background-color: var(--primary) !important;
            border-color: var(--primary) !important;
            color: var(--light) !important;
            padding: 15px 40px;
            font-size: 1.5rem;
            animation: bounce 2s infinite;
            margin-top: 20px;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        #feedback-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(10, 15, 29, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        #feedback-box {
            font-size: 2.8rem;
            font-weight: bold;
            padding: 20px 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            transform: scale(0.5);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .show-overlay { display: flex !important; }
        .show-overlay #feedback-box { transform: scale(1); }

        .correct-style { background-color: var(--success); color: var(--dark); }
        .wrong-style { background-color: var(--primary); color: var(--light); }
        .info-style { background-color: var(--warning); color: var(--dark); }

        .progress-bar { width: 100%; height: 10px; background-color: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; margin-top: 20px; }
        .progress-fill { height: 100%; width: 0%; background-color: var(--secondary); transition: width 0.3s ease; }

        .beyblade-prize {
            width: 160px;
            height: 160px;
            object-fit: contain;
            margin: 15px 0;
            filter: drop-shadow(0 0 15px var(--warning));
            animation: spinPrize 4s linear infinite;
        }

        @keyframes spinPrize {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @media (max-width: 380px) {
            h1 { font-size: 1.6rem; }
            h2 { font-size: 1.3rem; }
            .instruction { font-size: 1.1rem; }
            .visual-area { font-size: 2.8rem; }
            .btn { font-size: 1rem; padding: 12px 6px; }
            #feedback-box { font-size: 2.2rem; padding: 15px 25px; }
            .beyblade-prize { width: 120px; height: 120px; }
        }
    </style>
</head>
<body>

<div id="game-container">
    
    <div id="feedback-overlay">
        <div id="feedback-box">EXCELLENT!</div>
    </div>

    <div id="screen-select-member" class="screen active">
        <h1>ULTRAMAN DEFENSE</h1>
        <h2>請選擇你的超人防衛隊員</h2>
        <div class="visual-area" style="font-size: 4rem; min-height: 100px; margin: 10px 0;">🚀🛡️🛸</div>
        <p class="instruction">Select your Cadet to start training!</p>
        <div class="member-grid">
            <button class="btn btn-member" onclick="selectMember('亦樂')">⚡ 亦樂 (Cadet Lok)</button>
            <button class="btn btn-member" onclick="selectMember('允喬')">🛡️ 允喬 (Cadet Kiu)</button>
            <button class="btn btn-member" onclick="selectMember('立言')">🔮 立言 (Cadet Yin)</button>
        </div>
    </div>

    <div id="screen-start" class="screen">
        <h1 id="welcome-title">ULTRAMAN ACADEMY</h1>
        <h2 id="welcome-subtitle">超人防衛隊：新手任務訓練營</h2>
        <div class="visual-area" style="font-size: 4.5rem;">⚡🦸‍♂️ ⚔️ 👾⚡</div>
        <p class="instruction">Welcome, Cadet! 歡迎來到防衛隊！</p>
        <button class="btn btn-start" onclick="startGame()">START MISSION!</button>
    </div>

    <div id="screen-game" class="screen">
        <h2 id="mission-title">Mission</h2>
        <p id="mission-instruction" class="instruction">Question</p>
        <div id="mission-visual" class="visual-area"></div>
        <div id="mission-options" class="options-grid"></div>
    </div>

    <div id="screen-win" class="screen">
        <h1>🏆 MISSION ACCOMPLISHED!</h1>
        <h2 style="color: var(--warning);">你獲得了終極陀螺獎勵！</h2>
        
        <img class="beyblade-prize" src="https://images.unsplash.com/photo-1611605698335-8b15d27e0397?auto=format&fit=crop&w=300&q=80" alt="Beyblade X" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3209/3209930.png';">
        
        <p class="instruction" style="color: var(--success); font-size: 1.4rem;">3, 2, 1, Go Shoot!! 恭喜你完成全部挑戰！</p>
        <button class="btn btn-start" onclick="resetGame()">回主選單</button>
    </div>

    <div class="progress-bar">
        <div id="progress" class="progress-fill"></div>
    </div>
</div>

<script>
    let audioCtx = null;
    let currentSelectedMember = "";

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    function playSound(type) {
        initAudio();
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (type === 'correct') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(440, audioCtx.currentTime); 
            osc.frequency.setValueAtTime(554, audioCtx.currentTime + 0.08); 
            osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.16); 
            osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.24); 
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        } else if (type === 'wrong') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(180, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(60, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        } else if (type === 'laser') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(900, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.25);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.25);
        } else if (type === 'victory') {
            const now = audioCtx.currentTime;
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523.25, now); 
            osc.frequency.setValueAtTime(659.25, now + 0.15); 
            osc.frequency.setValueAtTime(783.99, now + 0.3); 
            osc.frequency.setValueAtTime(1046.50, now + 0.45); 
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
            osc.start(); osc.stop(now + 0.8);
        }
    }

    // 隊員選擇邏輯
    function selectMember(name) {
        playSound('laser');
        if (name === '亦樂') {
            currentSelectedMember = "亦樂";
            // 切換至歡迎畫面
            document.getElementById('welcome-title').innerText = "LOK'S MISSION";
            document.getElementById('welcome-subtitle').innerText = "超人防衛隊：亦樂特訓基地";
            document.getElementById('screen-select-member').classList.remove('active');
            document.getElementById('screen-start').classList.add('active');
        } else {
            // 允喬和立言顯示製作中提示
            const overlay = document.getElementById('feedback-overlay');
            const box = document.getElementById('feedback-box');
            box.innerHTML = `<span style="font-size:1.8rem; display:block; margin-bottom:10px;">MISSION LOADING...</span><span style="font-size:2.3rem; color:#ffcc00;">🛠️ ${name}的任務製作中！</span>`;
            box.className = "info-style";
            overlay.classList.add('show-overlay');
            
            // 1.5秒後自動關閉提示
            setTimeout(() => {
                overlay.classList.remove('show-overlay');
            }, 1800);
        }
    }

    const baseMissions = [
        {
            title: "M1: 我們的戰友 (Pronouns)",
            instruction: "Who is he? 🦸‍♂️",
            visual: "🦸‍♂️",
            options: ["He is Ultraman.", "She is Ultraman.", "They are Ultraman.", "It is Ultraman."],
            answer: "He is Ultraman."
        },
        {
            title: "M2: 我們的戰友 (Pronouns)",
            instruction: "Who is she? 👩‍🔬",
            visual: "👩‍🔬",
            options: ["He is Science Officer.", "She is Science Officer.", "We are Team.", "You are Cadet."],
            answer: "She is Science Officer."
        },
        {
            title: "M3: 我們的戰友 (Pronouns)",
            instruction: "Who are they? 🦸‍♂️🦸‍♂️🦸‍♂️",
            visual: "🦸‍♂️🦸‍♂️🦸‍♂️",
            options: ["We are team.", "You are team.", "It is team.", "They are our team."],
            answer: "They are our team."
        },
        {
            title: "M4: 情報掃描 (Numbers & Colors)",
            instruction: "Scan the monsters! How many RED monsters? 🔴👾",
            visual: "🔴👾 🔴👾 🔴👾<br>🔵👾 🔵👾",
            options: ["Two blue monsters", "Three red monsters", "Three blue monsters", "Five red monsters"],
            answer: "Three red monsters"
        },
        {
            title: "M5: 遠近偵測雷達 (This / That)",
            instruction: "The monster is FAR away! 📡 ⋯ ⋯ 👾",
            visual: "📡 ⋯ ⋯ ⋯ ⋯ 👾",
            options: ["This is a monster.", "That is a monster.", "These are monsters.", "Those are monsters."],
            answer: "That is a monster."
        },
        {
            title: "M6: 遠近偵測雷達 (These / Those)",
            instruction: "Look! MANY monsters are NEAR! ⚡👾👾",
            visual: "⚡ 👾 👾",
            options: ["This is monsters.", "That is monsters.", "These are monsters.", "Those are monsters."],
            answer: "These are monsters."
        },
        {
            title: "M7: 躲貓貓任務 (In / On / Under)",
            instruction: "Where is the monster? 👾🏢",
            visual: "👾<br>🏢",
            options: ["in the building", "on the building", "under the building", "next to the building"],
            answer: "on the building"
        },
        {
            title: "M8: 躲貓貓任務 (In / On / Under)",
            instruction: "Where is the monster now? 🏢👇👾",
            visual: "🏢<br>👇<br>👾",
            options: ["in the building", "on the building", "under the building", "you are the building"],
            answer: "under the building"
        }
    ];

    let gameMissions = [];
    let currentMission = 0;

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function initGameMissions() {
        gameMissions = JSON.parse(JSON.stringify(baseMissions));
        shuffle(gameMissions);
        gameMissions.forEach(m => {
            shuffle(m.options);
        });
    }

    function startGame() {
        playSound('laser');
        initGameMissions();
        currentMission = 0;
        document.getElementById('screen-start').classList.remove('active');
        document.getElementById('screen-game').classList.add('active');
        loadMission();
    }

    function loadMission() {
        const mission = gameMissions[currentMission];
        document.getElementById('mission-title').innerText = `Mission ${currentMission + 1} / ${gameMissions.length}`;
        document.getElementById('mission-instruction').innerHTML = mission.instruction;
        document.getElementById('mission-visual').innerHTML = mission.visual;
        
        const optionsContainer = document.getElementById('mission-options');
        
        optionsContainer.style.display = 'none';
        optionsContainer.innerHTML = '';
        
        const randomKey = Math.random().toString(36).substring(2, 7);
        
        mission.options.forEach((opt, index) => {
            const button = document.createElement('button');
            button.className = 'btn'; 
            button.innerText = opt;
            button.setAttribute('data-key', `${randomKey}-${index}`);
            
            button.onclick = function() {
                button.blur();
                checkAnswer(opt, mission.answer);
            };
            optionsContainer.appendChild(button);
        });

        setTimeout(() => {
            optionsContainer.style.display = 'grid';
        }, 20);

        const progressPercent = (currentMission / gameMissions.length) * 100;
        document.getElementById('progress').style.width = progressPercent + '%';
    }

    function checkAnswer(selectedOpt, correctOpt) {
        const overlay = document.getElementById('feedback-overlay');
        const box = document.getElementById('feedback-box');
        
        if (selectedOpt === correctOpt) {
            playSound('correct');
            box.innerText = "EXCELLENT! 🎖️";
            box.className = "correct-style";
            overlay.classList.add('show-overlay');
            
            setTimeout(() => {
                overlay.classList.remove('show-overlay');
                currentMission++;
                if (currentMission < gameMissions.length) {
                    loadMission();
                } else {
                    winGame();
                }
            }, 1200);
        } else {
            playSound('wrong');
            box.innerText = "TRY AGAIN! ⚡";
            box.className = "wrong-style";
            overlay.classList.add('show-overlay');
            
            setTimeout(() => {
                overlay.classList.remove('show-overlay');
            }, 1000);
        }
    }

    function winGame() {
        playSound('victory');
        document.getElementById('progress').style.width = '100%';
        document.getElementById('screen-game').classList.remove('active');
        document.getElementById('screen-win').classList.add('active');
    }

    function resetGame() {
        document.getElementById('screen-win').classList.remove('active');
        document.getElementById('screen-select-member').classList.add('active');
        document.getElementById('progress').style.width = '0%';
        currentSelectedMember = "";
    }
</script>

</body>
</html>
